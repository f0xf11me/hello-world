services:
  frontend:
    build: ./frontend
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build: ./backend
    working_dir: /app
    user: root
    command: bash -lc "mkdir -p log tmp/cache tmp/pids tmp/storage && touch log/development.log && rm -f tmp/pids/server.pid && bin/rails s -b 0.0.0.0 -p 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    environment:
      RAILS_ENV: development

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password